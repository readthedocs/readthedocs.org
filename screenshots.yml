# shot-scraper multi configuration for Read the Docs dashboard screenshots
# Usage: shot-scraper multi screenshots.yml --auth auth.json
#
# Each entry uses `selector` to capture only the main content container,
# and injects JS to hide the sidebar and notifications within it.

# Tutorial screenshots (docs/user/_static/images/tutorial/)
- url: https://app.readthedocs.org/dashboard/
  output: docs/user/_static/images/tutorial/rtd-empty-dashboard.png
  selector: .ui.very.padded.container
  width: 1280
  wait: 2000
  javascript: &hide_chrome |
    document.querySelectorAll(
      '.ui.stackable.grid > .five.wide.computer.column, '
      + '.ui.stackable.grid > .five.wide.computer.only.column, '
      + 'readthedocs-notification-list, '
      + '.ui.message'
    ).forEach(el => el.style.display = 'none');
    document.querySelectorAll('.eleven.wide.computer.column').forEach(el => {
      el.style.width = '100%';
      el.className = el.className.replace('eleven wide', 'sixteen wide');
    });

