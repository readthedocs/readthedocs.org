- url: https://app.readthedocs.org/dashboard/djtest/webhooks/1485/edit/
  output: docs/user/img/screenshots/community-project-webhook-secret.png
  selector: .ui.very.padded.container
  width: 1280
  wait: 2000
  javascript: |
    const h = Array.from(document.querySelectorAll('h3,h4,label,legend'))
        .find(el => el.textContent.toLowerCase().includes('secret'));
    if (h) h.scrollIntoView({block: 'center'});
    document.querySelectorAll(
      '.ui.stackable.grid > .five.wide.computer.column, '
      + '.ui.stackable.grid > .five.wide.computer.only.column, '
      + 'readthedocs-notification-list, '
      + '.ui.message'
    ).forEach(el => el.style.display = 'none');
    document.querySelectorAll('.eleven.wide.computer.column').forEach(el => {
      el.style.width = '100%';
      el.className = el.className.replace('eleven wide', 'sixteen wide');
    });

