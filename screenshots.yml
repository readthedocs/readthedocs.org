# shot-scraper multi configuration for Read the Docs dashboard screenshots
# Usage: shot-scraper multi screenshots.yml --auth auth.json
#
# Screenshots are cropped to show only the primary content area:
# - Non-settings pages: JS removes nav/footer, selector captures main container
# - Settings pages: selector_all captures just the right content column (no sidebar)

# Tutorial screenshots (docs/user/_static/images/tutorial/)

# Project list dashboard
- url: https://app.readthedocs.org/dashboard/
  javascript: |-
    document.querySelector('body > nav')?.remove();
    document.querySelectorAll('body > footer, body > .ui.inverted.vertical').forEach(el => el.remove());
  selector: body > div.ui.very.padded.container
  padding: 20
  width: 1280
  output: docs/user/_static/images/tutorial/rtd-empty-dashboard.png
  wait: 2000

