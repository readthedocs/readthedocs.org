# shot-scraper multi configuration for Read the Docs dashboard screenshots
# Usage: shot-scraper multi screenshots.yml --auth playwright_auth.json
#
# Uses `selector` to screenshot only the inner content column.

# Tutorial screenshots
- url: https://app.readthedocs.org/dashboard/
  output: docs/user/_static/images/tutorial/rtd-empty-dashboard.png
  selector: .ui.very.padded.container .eleven.wide.computer.column
  width: 992
  wait: 2000

# Project detail pages use a different layout without an eleven-wide column,
# so we target the container and strip its padding.
- url: https://app.readthedocs.org/projects/test-builds/
  output: docs/user/_static/images/tutorial/rtd-project-home.png
  selector: .ui.very.padded.container
  width: 992
  wait: 2000
  javascript: &strip_padding |
    const c = document.querySelector('.ui.very.padded.container');
    if (c) c.style.padding = '0';

- url: https://app.readthedocs.org/projects/test-builds/builds/
  output: docs/user/_static/images/tutorial/rtd-first-successful-build.png
  selector: .ui.very.padded.container
  width: 992
  wait: 2000
  javascript: *strip_padding

- url: https://app.readthedocs.org/projects/test-builds/versions/
  output: docs/user/_static/images/tutorial/active-versions.png
  selector: .ui.very.padded.container
  width: 992
  wait: 2000
  javascript: *strip_padding

- url: https://app.readthedocs.org/projects/test-builds/versions/?active=false
  output: docs/user/_static/images/tutorial/inactive-versions.png
  selector: .ui.very.padded.container
  width: 992
  wait: 2000
  javascript: *strip_padding

