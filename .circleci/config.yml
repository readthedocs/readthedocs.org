version: 2.1

orbs:
  codecov: codecov/codecov@3.2.2
  node: circleci/node@5.1.0

commands:
  setup-checkout:
    description: Checkout code, initialize submodules, and prepare cache keys
    steps:
      - checkout
      - run: git submodule sync
      - run: git submodule update --init
      - run:
          name: Combine requirements files for cache key
          command: cat requirements/*.txt > requirements-cache-key.txt

  skip-if-docs-only:
    description: Halt the job if only docs/ files changed (PR branches only)
    steps:
      - run:
          name: Skip tests if only docs changed
          command: |
            # Only run this check on PR branches, not on main.
            if [ "$CIRCLE_BRANCH" = "main" ]; then
              echo "On main branch — running tests."
              exit 0
            fi
            # Compare against the merge base with main to find changed files.
            changed_files=$(git diff --name-only $(git merge-base HEAD origin/main)..HEAD)
            if [ -z "$changed_files" ]; then
              echo "No changed files detected — running tests."
              exit 0
            fi
            non_docs=$(echo "$changed_files" | grep -v '^docs/')
            if [ -z "$non_docs" ]; then
              echo "Only docs changed — skipping tests."
              circleci-agent step halt
            fi

jobs:
  tests:
    docker:
      - image: 'cimg/python:3.12'
        environment:
          # Don't skip search tests.
          TOX_POSARGS: ''
          PYTEST_COVERAGE: --cov-report=xml --cov-config .coveragerc --cov=. --cov-append
      - image: 'docker.elastic.co/elasticsearch/elasticsearch:9.3.1'
        name: search
        environment:
          discovery.type: single-node
          ES_JAVA_OPTS: -Xms750m -Xmx750m
          ELASTIC_PASSWORD: password
          # Disabled SSL for testing.
          xpack.security.transport.ssl.enabled: 'false'
    steps:
      - setup-checkout
      - skip-if-docs-only
      - restore_cache:
          keys:
            - pip-tests-v1-{{ checksum "requirements-cache-key.txt" }}
            - pip-tests-v1-
      - run:
          name: Install rclone
          command: |
            if command -v rclone &> /dev/null; then
              echo "rclone already installed (from cache)"
            else
              curl -sSL https://downloads.rclone.org/rclone-current-linux-amd64.zip -o /tmp/rclone.zip
              unzip -o /tmp/rclone.zip -d /tmp
              cp /tmp/rclone-*-linux-amd64/rclone ~/.local/bin/
              chmod +x ~/.local/bin/rclone
              rm -rf /tmp/rclone*
            fi
      - run: pip install --user uv==0.8.17 tox tox-uv
      - run: tox -e py312
      - save_cache:
          key: pip-tests-v1-{{ checksum "requirements-cache-key.txt" }}
          paths:
            - ~/.local/lib
            - ~/.local/bin
            - .tox
      - codecov/upload

  tests-embedapi:
    docker:
      - image: 'cimg/python:3.12'
    steps:
      - setup-checkout
      - skip-if-docs-only
      - restore_cache:
          keys:
            - pip-embedapi-v1-{{ checksum "requirements-cache-key.txt" }}
            - pip-embedapi-v1-
      - run: pip install --user 'tox<4'
      - run: tox --version
      - run: tox -c tox.embedapi.ini
      - save_cache:
          key: pip-embedapi-v1-{{ checksum "requirements-cache-key.txt" }}
          paths:
            - ~/.local/lib
            - ~/.local/bin
            - .tox

  checks:
    docker:
      - image: 'cimg/python:3.12'
    steps:
      - setup-checkout
      # Recipe: https://pre-commit.com/#managing-ci-caches
      - run:
          name: Combine pre-commit config and requirements for caching
          command: |
            cp common/pre-commit-config.yaml pre-commit-cache-key.txt
            python --version --version >> pre-commit-cache-key.txt
            cat requirements-cache-key.txt >> pre-commit-cache-key.txt
      - restore_cache:
          keys:
          - pre-commit-cache-{{ checksum "pre-commit-cache-key.txt" }}
      - run: pip install --user uv==0.8.17 tox tox-uv
      - run: tox -e pre-commit
      - run: tox -e migrations
      - save_cache:
          key: pre-commit-cache-{{ checksum "pre-commit-cache-key.txt" }}
          paths:
          - ~/.cache/pre-commit

workflows:
  version: 2
  test:
    jobs:
      - checks
      - tests
      - tests-embedapi:
          requires:
            - checks
            - tests
